<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheikh Tamim | Developer</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
}

.container{
  width:350px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:30px;
  text-align:center;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

.pfp{
  width:130px;
  height:130px;
  border-radius:50%;
  margin:0 auto 15px;
  border:4px solid rgba(255,255,255,0.2);
  overflow:hidden;
}

.pfp img{
  width:100%;
  height:100%;
  object-fit:cover;
}

h1{
  font-size:22px;
  font-weight:600;
}

.role{
  font-size:14px;
  opacity:0.7;
  margin-bottom:15px;
}

.bio{
  font-size:14px;
  line-height:1.6;
  margin-bottom:20px;
  opacity:0.85;
}

.stats{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.stat{
  text-align:center;
}

.stat h2{
  font-size:18px;
}

.stat p{
  font-size:12px;
  opacity:0.6;
}

.buttons{
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
  transition:0.3s;
}

.btn-primary{
  background:#3b82f6;
  color:#fff;
}

.btn-secondary{
  background:#ef4444;
  color:#fff;
}

.btn:hover{
  transform:scale(1.05);
}

.socials{
  margin-top:20px;
  display:flex;
  justify-content:center;
  gap:15px;
}

.socials a{
  width:40px;
  height:40px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.1);
  transition:0.3s;
}

.socials a:hover{
  background:#3b82f6;
}

</style>
</head>

<body>

<div class="container">

  <div class="pfp">
    <img src="https://i.ibb.co.com/2B688r2/IMG-7132.png" alt="Tamim">
  </div>

  <h1>Sheikh Tamim</h1>
  <div class="role">Node.js Developer • Bot Creator</div>

  <div class="bio">
    Passionate developer focused on building powerful bots and APIs. 
    Experienced in Node.js, automation systems, and modern web tools. 
    Always experimenting with new tech and pushing limits.
  </div>

  <div class="stats">
    <div class="stat">
      <h2>50+</h2>
      <p>Projects</p>
    </div>
    <div class="stat">
      <h2>3+</h2>
      <p>Years</p>
    </div>
    <div class="stat">
      <h2>10K+</h2>
      <p>Users</p>
    </div>
  </div>

  <div class="buttons">
    <button class="btn btn-primary" onclick="window.open('https://facebook.com','_blank')">Message</button>
    <button class="btn btn-secondary" onclick="window.open('https://github.com','_blank')">GitHub</button>
  </div>

  <div class="socials">
    <a href="#">F</a>
    <a href="#">M</a>
    <a href="#">Y</a>
    <a href="#">G</a>
  </div>

</div>

</body>
</html>
